<style>
  :root{
    --dark:#014189;
    --blue:#0082E3;
    --cyan:#00A7C8;
    --violet:#684BF1;
    --green:#0F935D;
    --orange:#CC9006;
    --gray:#8899A6;
    --bg:#F4F7FB;
    --card:#ffffff;
    --text:#0E1B2C;
    --muted:#5B6B7C;
    --line:#E3EAF2;
    --shadow:0 6px 24px rgba(1,65,137,.08);
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'Montserrat',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  /* ===== Header ===== */
  .header{
    background:linear-gradient(135deg,#014189 0%,#0082E3 60%,#00A7C8 100%);
    color:#fff;padding:32px 24px 28px;
  }
  .header-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
  .logos img{height:44px;width:auto;background:#fff;padding:8px 14px;border-radius:10px}
  .title-block h1{
    font-weight:800;font-size:clamp(26px,3.4vw,40px);
    letter-spacing:-.4px;line-height:1.1;margin-bottom:8px;
  }
  .title-block p{font-weight:500;opacity:.9;font-size:15px;letter-spacing:-.2px}
  .back-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.25);color:#fff;
    padding:10px 18px;border-radius:999px;font-weight:600;font-size:14px;
    transition:.2s;align-self:flex-start;
  }
  .back-btn:hover{background:rgba(255,255,255,.28)}

  /* ===== Days nav ===== */
  .days-nav{
    position:sticky;top:0;z-index:10;
    background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .days-scroll{
    max-width:1200px;margin:0 auto;
    display:flex;gap:8px;padding:14px 24px;
    overflow-x:auto;scrollbar-width:thin;
  }
  .days-scroll::-webkit-scrollbar{height:6px}
  .days-scroll::-webkit-scrollbar-thumb{background:#cfd8e3;border-radius:3px}
  .day-btn{
    flex:0 0 auto;border:none;cursor:pointer;
    background:#fff;border:1.5px solid var(--line);
    padding:10px 14px;border-radius:12px;
    font-family:inherit;font-weight:700;font-size:13px;color:var(--text);
    letter-spacing:-.2px;transition:.2s;
    display:flex;flex-direction:column;align-items:center;gap:2px;min-width:72px;
  }
  .day-btn .dow{font-weight:500;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .day-btn:hover{border-color:var(--blue);color:var(--blue)}
  .day-btn.active{
    background:linear-gradient(135deg,var(--dark),var(--blue));
    color:#fff;border-color:transparent;
    box-shadow:0 6px 16px rgba(0,130,227,.3);
  }
  .day-btn.active .dow{color:rgba(255,255,255,.85)}

  /* ===== Content ===== */
  .content{max-width:1200px;margin:0 auto;padding:32px 24px 80px}
  .day-panel{display:none;animation:fade .3s ease}
  .day-panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .day-head{
    display:flex;align-items:baseline;justify-content:space-between;
    flex-wrap:wrap;gap:12px;margin-bottom:22px;
  }
  .day-head h2{
    font-weight:800;font-size:clamp(22px,2.4vw,30px);
    letter-spacing:-.4px;color:var(--dark);
  }
  .day-head .date-sub{color:var(--muted);font-weight:500;font-size:14px}

  /* ===== Cards ===== */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
  .card{
    background:var(--card);border-radius:var(--radius);
    padding:20px 22px;box-shadow:var(--shadow);
    border:1px solid var(--line);
    border-left:5px solid var(--gray);
    position:relative;transition:.25s;
    display:flex;flex-direction:column;gap:12px;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(1,65,137,.14)}
  .card[data-mod="1"]{border-left-color:var(--dark)}
  .card[data-mod="2"]{border-left-color:var(--blue)}
  .card[data-mod="3"]{border-left-color:var(--cyan)}
  .card[data-mod="4"]{border-left-color:var(--violet)}
  .card[data-mod="5"]{border-left-color:var(--green)}
  .card[data-mod="6"]{border-left-color:var(--orange)}
  .card[data-mod="org"]{border-left-color:var(--gray);background:#F7FAFC}

  .card-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .time{font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.2px}
  .mod-badge{
    font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;
    color:#fff;letter-spacing:.3px;text-transform:uppercase;
  }
  .mod-badge[data-m="1"]{background:var(--dark)}
  .mod-badge[data-m="2"]{background:var(--blue)}
  .mod-badge[data-m="3"]{background:var(--cyan)}
  .mod-badge[data-m="4"]{background:var(--violet)}
  .mod-badge[data-m="5"]{background:var(--green)}
  .mod-badge[data-m="6"]{background:var(--orange)}
  .mod-badge[data-m="org"]{background:var(--gray)}

  .format-badge{
    font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;
    border:1.5px solid var(--line);color:var(--muted);
    display:inline-flex;align-items:center;gap:5px;
  }
  .format-badge.online{border-color:#0082E3;color:#0082E3;background:rgba(0,130,227,.08)}
  .format-badge.offline{border-color:#CC9006;color:#CC9006;background:rgba(204,144,6,.08)}
  .format-badge.async{border-color:#684BF1;color:#684BF1;background:rgba(104,75,241,.08)}
  .format-badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}

  .card-title{
    font-weight:700;font-size:16px;line-height:1.35;letter-spacing:-.3px;
  }
  .card[data-mod="1"] .card-title{color:var(--dark)}
  .card[data-mod="2"] .card-title{color:var(--blue)}
  .card[data-mod="3"] .card-title{color:var(--cyan)}
  .card[data-mod="4"] .card-title{color:var(--violet)}
  .card[data-mod="5"] .card-title{color:var(--green)}
  .card[data-mod="6"] .card-title{color:var(--orange)}
  .card[data-mod="org"] .card-title{color:var(--text)}

  /* Speaker */
  .speaker{display:flex;align-items:center;gap:12px;margin-top:4px}
  .avatar{
    width:40px;height:40px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:13px;letter-spacing:.3px;
    flex:0 0 auto;
  }
  .avatar[data-m="1"]{background:var(--dark)}
  .avatar[data-m="2"]{background:var(--blue)}
  .avatar[data-m="3"]{background:var(--cyan)}
  .avatar[data-m="4"]{background:var(--violet)}
  .avatar[data-m="5"]{background:var(--green)}
  .avatar[data-m="6"]{background:var(--orange)}
  .avatar[data-m="org"]{background:var(--gray)}
  .speaker-info{display:flex;flex-direction:column;gap:2px;min-width:0}
  .speaker-name{font-weight:700;font-size:14px;color:var(--text);letter-spacing:-.2px}
  .speaker-role{font-size:12px;color:var(--muted);line-height:1.35}

  /* Multi-speaker */
  .speakers{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .speakers .speaker{margin-top:0}

  /* Location tag */
  .location{
    display:inline-flex;align-items:center;gap:6px;
    font-size:12px;color:var(--muted);font-weight:500;

    .content{padding:20px 16px 60px}
    .days-scroll{padding:12px 16px}
    .day-btn{min-width:60px;padding:8px 10px;font-size:12px}
    .cards{grid-template-columns:1fr;gap:14px}
    .card{padding:16px 18px}
    .card-title{font-size:15px}
  }
</style>
</head>

/* ============ РЕНДЕР ============ */
const MOD_NAMES = {
  "1":"Модуль 1","2":"Модуль 2","3":"Модуль 3",
  "4":"Модуль 4","5":"Модуль 5","6":"Модуль 6","org":"Орг."
};
const FORMAT_LABEL = {online:"Онлайн",offline:"Очно",async:"Асинхрон"};

function initials(name){
  if(!name) return "?";
  const parts = name.trim().split(/\s+/);
  if(parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

function renderSpeaker(s, m){
  return `
    <div class="speaker">
      <div class="avatar" data-m="${m}">${initials(s.n)}</div>
      <div class="speaker-info">
        <div class="speaker-name">${s.n}</div>
        ${s.r ? `<div class="speaker-role">${s.r}</div>` : ""}
      </div>
    </div>`;
}

function renderCard(it){
  const speakersBlock = it.speakers && it.speakers.length
    ? `<div class="speakers">${it.speakers.map(s=>renderSpeaker(s,it.m)).join("")}</div>`
    : "";
  const loc = it.loc ? `<div class="location">${it.loc}</div>` : "";
  return `
    <article class="card" data-mod="${it.m}">
      <div class="card-top">
        <span class="time">${it.t}</span>
        <span class="format-badge ${it.f}">${FORMAT_LABEL[it.f]}</span>
        <span class="mod-badge" data-m="${it.m}">${it.code}</span>
      </div>
      <div class="card-title">${it.title}</div>
      ${loc}
      ${speakersBlock}
    </article>`;
}

function renderDay(day, idx){
  return `
    <section class="day-panel" data-idx="${idx}">
      <div class="day-head">
        <h2>${day.full}</h2>
        <span class="date-sub">${day.items.length} ${day.items.length===1?"событие":"событий"} в программе</span>
      </div>
      <div class="cards">${day.items.map(renderCard).join("")}</div>
    </section>`;
}

/* ============ ИНИЦИАЛИЗАЦИЯ ============ */
const scroll = document.getElementById("daysScroll");
const content = document.getElementById("content");

scroll.innerHTML = DAYS.map((d,i)=>`
  <button class="day-btn ${i===0?"active":""}" data-idx="${i}">
    <span>${d.date}</span>
    <span class="dow">${d.dow}</span>
  </button>`).join("");

content.innerHTML = DAYS.map(renderDay).join("");

scroll.querySelectorAll(".day-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    scroll.querySelectorAll(".day-btn").forEach(b=>b.classList.remove("active"));
    content.querySelectorAll(".day-panel").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    content.querySelector(`.day-panel[data-idx="${btn.dataset.idx}"]`).classList.add("active");
  });
});

/* Активируем первый день */
content.querySelector('.day-panel[data-idx="0"]').classList.add("active");
</script>
